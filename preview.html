<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>silverbucket.net — Terminal Prompt Logo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f2ee;
      --surface: #faf8f5;
      --text: #2d2520;
      --text-secondary: #6b6058;
      --accent: #c0603a;
      --border: #e3dfd8;

      --display: 'Fraunces', Georgia, 'Times New Roman', serif;
      --body: 'DM Sans', system-ui, -apple-system, sans-serif;
      --mono: 'JetBrains Mono', 'Menlo', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--body);
      font-size: 1rem;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      padding: 48px 24px 96px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    h1 {
      font-family: var(--display);
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 48px;
    }

    .variation {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 24px;
    }

    .variation h2 {
      font-family: var(--display);
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .variation .concept {
      color: var(--text-secondary);
      font-size: 0.875rem;
      margin-bottom: 24px;
      max-width: 60ch;
    }

    .size-row {
      display: flex;
      align-items: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .size-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .size-label {
      font-family: var(--body);
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
    }

    .logo-display {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>silverbucket.net</h1>
    <p class="subtitle">Selected logo — Terminal Prompt</p>

    <div class="variation">
      <h2>Terminal Prompt</h2>
      <p class="concept">The developer identity distilled: a terminal prompt with the abbreviated handle. Favicon reduces to the universal &gt;_ symbol.</p>
      <div class="size-row">
        <div class="size-cell">
          <span class="size-label">Header 200px</span>
          <div class="logo-display">
            <svg width="200" height="40" viewBox="0 0 320 56">
              <title>silverbucket — terminal prompt logo</title>
              <text x="4" y="40" font-family="'JetBrains Mono', 'Menlo', monospace" font-size="34" font-weight="400" fill="#c0603a">&gt;</text>
              <text x="28" y="40" font-family="'JetBrains Mono', 'Menlo', monospace" font-size="34" font-weight="500" fill="#2d2520" letter-spacing="1">slvrbckt</text>
              <rect x="272" y="28" width="16" height="3" fill="#c0603a" opacity="0.9">
                <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
              </rect>
            </svg>
          </div>
        </div>
        <div class="size-cell">
          <span class="size-label">64px</span>
          <div class="logo-display">
            <svg width="64" height="64" viewBox="0 0 64 64">
              <text x="4" y="40" font-family="'JetBrains Mono', 'Menlo', monospace" font-size="36" font-weight="500" fill="#c0603a">&gt;</text>
              <text x="28" y="40" font-family="'JetBrains Mono', 'Menlo', monospace" font-size="36" font-weight="500" fill="#2d2520">_</text>
            </svg>
          </div>
        </div>
        <div class="size-cell">
          <span class="size-label">32px</span>
          <div class="logo-display">
            <svg width="32" height="32" viewBox="0 0 64 64">
              <text x="2" y="44" font-family="'JetBrains Mono', 'Menlo', monospace" font-size="42" font-weight="500" fill="#c0603a">&gt;</text>
              <text x="30" y="44" font-family="'JetBrains Mono', 'Menlo', monospace" font-size="42" font-weight="500" fill="#2d2520">_</text>
            </svg>
          </div>
        </div>
        <div class="size-cell">
          <span class="size-label">16px</span>
          <div class="logo-display">
            <svg width="16" height="16" viewBox="0 0 64 64">
              <text x="0" y="48" font-family="'JetBrains Mono', 'Menlo', monospace" font-size="50" font-weight="500" fill="#c0603a">&gt;</text>
              <text x="32" y="48" font-family="'JetBrains Mono', 'Menlo', monospace" font-size="50" font-weight="500" fill="#2d2520">_</text>
            </svg>
          </div>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
